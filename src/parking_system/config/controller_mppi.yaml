# MPPI controller params — loaded ONLY when launched with controller:=mppi.
# Layered AFTER nav2_navigation_params.yaml so this controller_server block
# overrides the RPP one; RPP stays the no-rebuild fallback (controller:=rpp).
#
# MPPI (Model Predictive Path Integral) samples a batch of candidate
# trajectories each tick, rolls them through the Ackermann motion model, and
# scores them against the costmap via critics. Unlike RPP it keeps clearance
# from walls *while continuing forward* instead of relying on a binary
# collision_monitor stop — which is why it replaces the "unsafe" (monitor
# disabled) workaround for driving past walls in tight lanes.
#
# Tuned as a STARTING POINT for the 2x2 m Ackermann testbed at ~0.10 m/s and
# kept conservative for the Raspberry Pi 5. The benchmark gate (see plan /
# TEST.md) measures controller_server CPU + achieved /cmd_vel Hz before this is
# finalised. Pi-5 back-off ladder if the rate can't hold >=8 Hz:
#   1. batch_size 1000 -> 800 -> 600   (cheapest, ~linear CPU)
#   2. time_steps 40 -> 30 -> 24
#   3. controller_frequency + model_dt together (keep model_dt == 1/freq):
#      10/0.1 -> 8/0.125
#   4. CostCritic.consider_footprint true -> false (circular check fallback)

controller_server:
  ros__parameters:
    use_sim_time: false
    # 10 Hz: MPPI rolls a full batch every tick (RPP ran 20 Hz cheaply; MPPI
    # cannot). model_dt below MUST equal 1/controller_frequency.
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    # Same long failure window + stall backstop as the RPP config.
    failure_tolerance: 1.0
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      # Open-loop L298N chassis creeps during a parking approach — same gate
      # as the RPP config: must cover >=8 cm in any 45 s window.
      required_movement_radius: 0.08
      movement_time_allowance: 45.0

    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.05
      yaw_goal_tolerance: 0.06

    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      # --- optimizer / horizon (DOWNSIZED for Pi-5) ---
      # Was batch 1000 x time_steps 40 x 8 critics @ 10 Hz — too heavy for the
      # Pi 5, so the controller fell behind 10 Hz, commands arrived late, the
      # bridge's 200 ms timeout zeroed them, and the drive stalled while the
      # servo flailed on stale/jumpy wz. Cut ~6x: batch 1000->384, steps 40->24
      # (horizon 4.0 s -> 2.4 s, plenty for a 1-2 m testbed). Verify it now
      # holds rate: `ros2 topic hz /cmd_vel` should read ~10 Hz under a goal.
      time_steps: 24            # horizon = time_steps * model_dt = 2.4 s
      model_dt: 0.1             # == 1/controller_frequency
      batch_size: 384           # primary Pi-5 CPU knob (raise toward 600 if CPU allows)
      iteration_count: 1
      temperature: 0.3          # softmax selectiveness (lower = greedier)
      gamma: 0.015
      # Sampling noise std-devs. vy unused on a non-holonomic chassis.
      # vx_std lowered 0.1 -> 0.05: at the old value the velocity samples
      # sprayed across nearly the whole [vx_min, vx_max] band, so the weighted
      # mean vx dithered around zero and flipped sign — which trips the Pico
      # bridge's creep gate (vx<0.05 -> SPEED 0) and 500 ms cusp-hold over and
      # over, pinning SPEED at 0 so the kick-start never completes and the car
      # never moves. A tighter vx_std keeps the command decisive/forward.
      vx_std: 0.05
      vy_std: 0.0
      # wz_std lowered 0.3 -> 0.15: the steering servo follows wz directly, so a
      # noisy wz makes the servo flail. At low vx the Ackermann IK (delta =
      # atan(L*wz/vx)) is hypersensitive, amplifying any wz jitter to near
      # full-lock — tighter wz sampling keeps the steering steady.
      wz_std: 0.15
      # --- velocity / accel limits (lockstep with velocity_smoother) ---
      # 0.25 m/s matches the calibrated firmware speed scale
      # (SPEED 30 == MOTOR_V_MAX_MPS 0.25). Reverse is allowed for parking cusps
      # but capped slightly lower.
      vx_max: 0.25              # == velocity_smoother.max_velocity[0]; speed slider tunes this
      vx_min: -0.20             # reverse allowed (K-turn / back-in), above move floor
      vy_max: 0.0
      wz_max: 0.5               # <= velocity_smoother wz cap (0.5)
      # Faster ramp through the bridge's 0.10 m/s creep gate so the Pico
      # start-assist sees a decisive command quickly.
      ax_max: 0.60
      ax_min: -0.60
      ay_max: 0.0
      az_max: 0.35
      # --- path handling ---
      transform_tolerance: 0.2
      prune_distance: 1.5
      # REEDS_SHEPP plans contain cusps; let the path handler split at
      # direction reversals so the controller commits to one segment at a time.
      enforce_path_inversion: true
      inversion_xy_tolerance: 0.2
      inversion_yaw_tolerance: 0.4
      # --- motion model (Ackermann: no in-place rotation) ---
      motion_model: "Ackermann"
      AckermannConstraints:
        min_turning_r: 0.50     # lockstep with planner minimum_turning_radius
      # Trajectory viz off to save Pi CPU (flip on only for RViz debugging).
      visualize: false
      regenerate_noises: false
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3

      critics: [
        "ConstraintCritic", "CostCritic", "GoalCritic", "GoalAngleCritic",
        "PreferForwardCritic", "PathAlignCritic", "PathFollowCritic",
        "PathAngleCritic", "VelocityDeadbandCritic"
      ]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
      # CostCritic is the obstacle authority now that collision_monitor is
      # disabled. Reads the local costmap (inflation_radius 0.14,
      # cost_scaling_factor 6.0). consider_footprint: true uses the real
      # rectangular footprint (back-off knob: set false for a cheaper circular
      # check if the Pi can't hold rate).
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.81
        critical_cost: 300.0
        consider_footprint: true
        collision_cost: 1000000.0
        near_goal_distance: 0.5
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.5
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        threshold_to_consider: 0.4
      # Bias forward, but allow reverse when geometry demands it.
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        threshold_to_consider: 0.5
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 14.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 0.5
        offset_from_furthest: 20
        use_path_orientations: false
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 5
        threshold_to_consider: 1.0
      # mode: 2 = consider feasible path orientations (forward AND reverse) —
      # required so reverse cusps in a REEDS_SHEPP path aren't fought.
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 2.0
        offset_from_furthest: 4
        threshold_to_consider: 0.5
        max_angle_to_furthest: 1.0
        mode: 2
      VelocityDeadbandCritic:
        enabled: true
        cost_power: 1
        cost_weight: 35.0
        deadband_velocities: [0.12, 0.0, 0.0]
