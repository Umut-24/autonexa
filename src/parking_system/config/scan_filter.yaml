scan_to_scan_filter_chain:
  ros__parameters:
    filter1:
      name: range
      type: laser_filters/LaserScanRangeFilter
      params:
        lower_threshold: 0.05
        upper_threshold: 4.0
        use_message_range_limits: false
    filter2:
      name: shadow
      type: laser_filters/ScanShadowsFilter
      params:
        min_angle: 10.0
        max_angle: 170.0
        neighbors: 20
        window: 0
    # NOTE: the previous filter3 (laser_filters/MedianFilter) and filter4
    # (laser_filters/LaserScanOutlierFilter) were REMOVED on 2026-05-20 —
    # neither plugin type exists in the installed Jazzy laser_filters, so the
    # whole scan_to_scan_filter_chain aborted (SIGABRT) at startup, which
    # collapsed /scan_filtered -> laser_scan_matcher -> AMCL -> map->odom.
    # range + shadow both load and are sufficient. If outlier rejection is
    # wanted later, use a VALID Jazzy type, e.g. laser_filters/LaserScanSpeckleFilter.
