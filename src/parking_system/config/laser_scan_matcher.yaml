laser_scan_matcher:
  ros__parameters:
    # ============================================
    # BASIC PARAMETERS
    # ============================================
    base_frame: base_link
    odom_frame: odom
    laser_frame: laser_link  # CRITICAL: Must match the frame_id of the LIDAR scans
    # Note: map_frame is not needed - laser_scan_matcher only provides odometry
    # scan_topic is set via remapping in launch file - don't set here
    
    # ============================================
    # PUBLISHING PARAMETERS
    # ============================================
    publish_odom: /odom  # Publish odometry on /odom topic (must be topic name string, not boolean!)
    publish_tf: true  # Publish odom->base_link transform
    publish_pose: false  # Don't publish pose separately
    publish_pose_stamped: false  # Don't publish pose stamped
    
    # ============================================
    # SCAN MATCHING PARAMETERS (Optimized for manual LIDAR movement)
    # ============================================
    # ICP (Iterative Closest Point) parameters
    use_icp: true  # Use ICP for scan matching
    use_odom: false  # No wheel odometry available
    use_imu: false  # No IMU available
    
    # Scan matching thresholds. Tightened 0.10 m / 10° → 0.04 m / 5° on
    # 2026-05-13 to fight the progressive scan-vs-static-map drift the
    # operator was seeing over multi-minute sessions. The 2 m testbed only
    # gave the matcher a few keyframes per loop at 10 cm spacing, so ICP
    # could drift several cm between corrections; SLAM Toolbox could only
    # refine the bad odometry it was given. 4 cm / 5° gives a denser
    # constraint graph at modest extra Pi 5 CPU.
    kf_dist_linear: 0.04   # Keyframe distance (4cm)
    kf_dist_angular: 0.0873 # Keyframe angular distance (~5 degrees)

    # ICP parameters
    max_iterations: 30  # Maximum ICP iterations
    # Tightened 0.30 → 0.18 m: stricter correspondence rejects outlier
    # matches that were letting ICP drift on noisy walls. 18 cm still
    # comfortably covers the per-keyframe motion (4 cm linear + slop).
    max_correspondence_distance: 0.18
    max_angular_correction_deg: 45.0  # Maximum angular correction (degrees)
    max_linear_correction: 0.5  # Maximum linear correction (50cm)
    
    # ============================================
    # FREQUENCY AND TIMING (High frequency for manual movement)
    # ============================================
    scan_queue_size: 10  # Queue size for scans
    odom_queue_size: 10  # Queue size for odometry
    
    # ============================================
    # NOISE PARAMETERS (For manual movement)
    # ============================================
    # Odometry noise model (since we have no wheel encoders, trust scan matching)
    odom_alpha1: 0.1  # Rotation noise from rotation
    odom_alpha2: 0.1  # Rotation noise from translation
    odom_alpha3: 0.1  # Translation noise from translation
    odom_alpha4: 0.1  # Translation noise from rotation
    
    # ============================================
    # SCAN PROCESSING
    # ============================================
    use_cloud_input: false  # Use LaserScan, not PointCloud
    cloud_range_min: 0.05  # Minimum range (5cm)
    cloud_range_max: 4.0  # Maximum range (4m)
    
    # ============================================
    # DEBUGGING
    # ============================================
    do_compute_covariance: true  # Compute covariance for odometry
    debug: false  # Disable debug output for performance

