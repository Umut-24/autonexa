# Nav2 Parameters for Parking Navigation System
# Optimized for small-scale indoor environment (1-2m areas)
# Supports road mask/keepout zones

amcl:
  ros__parameters:
    use_sim_time: false
    
    # Frame configuration
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    global_frame_id: "map"
    # Subscribe to the cleaned scan so AMCL benefits from the same 4-stage
    # filter chain that feeds laser_scan_matcher and the costmap obstacle
    # layers. Raw /scan still exists for diagnostics.
    scan_topic: "/scan_filtered"

    # UPDATE RATE - VERY FREQUENT FOR SMALL SPACE
    update_min_d: 0.02       # Update every 2cm
    update_min_a: 0.05       # Update every ~3 degrees

    # RESAMPLING - FAST CONVERGENCE
    resample_interval: 1     # Resample every update

    # PARTICLE FILTER - sized for a known-prior 2 m testbed.
    # Was 5000/10000 (global-localization sizing) which ran the Pi 5 hot
    # without accuracy gain once set_initial_pose seeds the cloud at the
    # operator's chosen pose. nav2 defaults (500/2000) converge in <1 s
    # here and leave CPU headroom for the rest of the Nav2 stack.
    min_particles: 500
    max_particles: 2000
    pf_err: 0.01             # Lower error threshold
    pf_z: 0.99               # High confidence required
    
    # RECOVERY - AGGRESSIVE
    recovery_alpha_slow: 0.0     # Disable slow recovery
    recovery_alpha_fast: 0.1     # Fast recovery
    
    # LASER MODEL - AGGRESSIVE MATCHING (TRUST LASER!)
    laser_model_type: "likelihood_field_prob"
    # Cap at the /scan_filtered upper threshold (4 m) and SLAM Toolbox
    # max_laser_range — beyond this the C1 returns are too noisy to trust.
    laser_max_range: 4.0
    laser_min_range: 0.05
    max_beams: 180           # Use ALL beams for shape matching

    # LIKELIHOOD FIELD - WIDE ATTRACTION
    sigma_hit: 0.1           # 10cm acceptance radius
    laser_likelihood_max_dist: 4.0   # Match laser_max_range
    
    # LASER MODEL WEIGHTS - TRUST GEOMETRY
    z_hit: 0.9               # Trust laser hits!
    z_rand: 0.1              # Allow some noise
    z_short: 0.0
    z_max: 0.0
    
    # BEAM SKIP - DISABLED FOR GLOBAL LOCALIZATION
    do_beamskip: false       # Use ALL beams
    
    # ODOMETRY MODEL
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    
    # TF SETTINGS
    tf_broadcast: true
    transform_tolerance: 1.0
    
    # INITIAL POSE - seeded by nav2_amcl_navigation.launch.py via RewrittenYaml.
    # The launch file rewrites initial_pose.{x,y,yaw} from operator-supplied
    # CLI args so AMCL converges from a known seed instead of doing global
    # localization (which is wasteful when the operator knows the start pose
    # on a small testbed). Set false + use /initialpose if you want global
    # localization or external seeding via the mobile app /api/relocalize.
    set_initial_pose: true
    always_reset_initial_pose: false
    first_map_only: true

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    # Only load NavigateToPose. The default NavigateThroughPoses tree invokes
    # Spin recovery; Spin is intentionally not launched for this Ackermann
    # chassis, so loading that navigator keeps bt_navigator from activating.
    navigators: ["navigate_to_pose"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    # Ackermann-aware BT with a periodic ComputePathToPose tick (RateController
    # hz=1.0) so the planner re-evaluates every second — recovers automatically
    # when collision_monitor stalls the chassis but the existing path is still
    # nominally valid. The launch file rewrites this absolute path against the
    # actual install share at runtime.
    default_nav_to_pose_bt_xml: "/opt/ros/jazzy/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"
    enable_groot_monitoring: false

controller_server:
  ros__parameters:
    use_sim_time: false
    # 20 Hz keeps RPP responsive on tight curves where each 10 Hz tick was
    # ~3 cm of travel — non-trivial when the lookahead floor sits near R_min.
    # RPP is cheap (no trajectory sampling) so the Pi5 has the headroom.
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    # 1.0 s (was 0.3): 0.3 s aborted on transient computeVelocityCommands
    # exceptions (footprint brushing inflation halo, brief TF blip). 1.0 s
    # = ~20 ticks at 20 Hz, enough to ride out a glitch, still short
    # enough that a genuinely wedged robot triggers Nav2 recovery
    # promptly. progress_checker below is the long-stall backstop.
    failure_tolerance: 1.0
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      # 0.08 m / 45 s (was 0.10 m / 30 s, originally 0.3 m / 10 s): the
      # open-loop L298N chassis legitimately creeps during a parking
      # approach. Even the previous 0.10 m / 30 s gate (~3.3 mm/s sustained
      # minimum) was tripping on slow final-approach creep. New rule:
      # robot must cover >=8 cm in any 45 s window (~1.8 mm/s minimum)
      # — only trips on a genuine stall.
      required_movement_radius: 0.08
      movement_time_allowance: 45.0
    
    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      # 5 cm (0.06 → 0.05 on 2026-06-02, operator choice): tightened back for
      # precision. The car hunts/iterates near the goal at this tolerance
      # (chassis can't settle finely at the low-speed floor) but the operator
      # accepts that for now — the real fix is the encoder-PI creep tune later.
      xy_goal_tolerance: 0.05
      # 0.06 rad (~3.4°), tightened back from 0.09 on 2026-06-02 (operator
      # choice: keep precision, accept the goal-approach hunting). True ±2°
      # still needs an IMU+EKF / marker dock; this just stops the controller
      # from accepting a sloppier heading.
      yaw_goal_tolerance: 0.06
    
    # Regulated Pure Pursuit - Ackermann-friendly path tracking.
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      # 0.22 m/s cruise: high enough to stay out of the floor-load deadband,
      # below the 0.25 m/s closed-loop top-speed scale.
      desired_linear_vel: 0.22

      # SNAKE FIX (primary): push the carrot well outside the chassis
      # footprint. With small lookahead the steering command was a steep
      # function of even sub-cm lateral noise — 1 cm error at 0.20 m
      # carrot demands ~42% of max steering (12.6°). Same error at 0.50 m
      # carrot only demands ~7% (2°). Bigger carrot = lower P-gain feel.
      lookahead_dist: 0.40
      min_lookahead_dist: 0.35
      max_lookahead_dist: 0.55
      # IMPORTANT: velocity-scaled lookahead DISABLED. At our cruise of
      # 0.10 m/s × the old 0.5 s window it would shrink the carrot to
      # 0.05 m, which then clamped to min_lookahead and stayed there —
      # so the "velocity scaling" was effectively just "use min" and
      # P-gain spiked. Fixed lookahead at lookahead_dist gives uniform
      # carrot regardless of speed.
      use_velocity_scaled_lookahead_dist: false
      lookahead_time: 0.5
      # Curvature carrot — used only for the steering command, separate
      # from the speed/progress carrot. Larger than lookahead_dist so
      # steering reads from further down the path and ignores short-
      # wavelength path noise.
      curvature_lookahead_dist: 0.45
      transform_tolerance: 0.2
      # DISABLED — RPP's own forward-sim collision check fires the moment
      # the robot's footprint already overlaps an inflated cell (the wall-
      # parked start case), which produced the "plan shown but robot frozen"
      # symptom. Single collision authority is now collision_monitor, whose
      # DirectionalStop polygons are direction-aware (commanding reverse
      # while facing a wall is allowed; the wall is only in the forward
      # polygon, not the reverse one).
      use_collision_detection: false
      # Irrelevant while use_collision_detection is false, but kept tight
      # in case it's flipped back on for debugging.
      max_allowed_time_to_collision_up_to_carrot: 0.4
      # Curve-based scaling (slow down for tight curves) stays ON — it
      # is geometry-driven and never noisy.
      use_regulated_linear_velocity_scaling: true
      # Cost-based scaling DISABLED. In a 2×2 m testbed the chassis is
      # always within inflation distance of *something*; costmap noise
      # then made the scaled velocity ripple, which is the 2nd-largest
      # contributor to snake. DirectionalStop + approach scaling now
      # cover the "slow before hitting things" job.
      use_cost_regulated_linear_velocity_scaling: false
      # Kept for symmetry (no-op while cost scaling is disabled).
      cost_scaling_dist: 0.45
      cost_scaling_gain: 0.0
      # Updated in lockstep with planner R_min: 0.85 m × ~1.4 = 1.20 m.
      # RPP starts shaving speed when the path's instantaneous radius
      # drops below this — so on tight 3-point park curves the chassis
      # is already crawling by the time it hits the cusp.
      regulated_linear_scaling_min_radius: 1.20

      # Keep curve-regulated speeds above the drivetrain's usable movement band;
      # lower values get gated to zero by the bridge and cause stop/start crawl.
      regulated_linear_scaling_min_speed: 0.16
      # Start the approach taper 1.5 m out (was 0.8 m). The car was
      # 0.60 m: shortened from 1.5 m. The previous long slow tail caused
      # the chassis to spend ~10 s creeping at sub-stall speeds, which
      # masked goal-overshoot under open-loop motor scaling. 0.60 m
      # keeps cruise velocity up until the last N cm, then ramps down
      # to the new floor at min_approach_linear_velocity. 0.60 → 1.0 on
      # 2026-06-01: start decelerating a full metre out so the chassis
      # arrives slow and gentle instead of braking hard in the last 60 cm
      # and overshooting the goal (a source of end-of-park hunting).
      approach_velocity_scaling_dist: 1.0
      # 0.16 → 0.12 on 2026-06-01: slower final creep = less overshoot at the
      # goal. Still above the bridge's 0.10 m/s creep gate, so it produces a
      # clean stop rather than a low-duty crawl. Lower toward ~0.08 only after
      # the encoder-PI creep tune (see plan Kova 2) makes sub-0.10 stable.
      min_approach_linear_velocity: 0.12
      # Ackermann chassis: no rotate-in-place. Reversing IS allowed (paired
      # with the planner's REEDS_SHEPP default below) — on a 2x2 m testbed
      # DUBIN's forward-only paths produced contorted loops that satisfied
      # the goal-yaw constraint but fit poorly inside the box. Allowing
      # reverse + REEDS_SHEPP lets the planner emit a clean K-turn or
      # back-into-pose segment when needed; the cusp-tracking trade-off is
      # acceptable for parking-style maneuvers in tight spaces.
      use_rotate_to_heading: false
      allow_reversing: true
      # Pulled back 3.0 → 1.5 m. The 3 m setting was too permissive — on
      # 3-point park paths the controller was re-finding the *previous*
      # segment after a cusp instead of advancing to the next one,
      # producing the "plan drawn but car just reverses" symptom on
      # 180° goals. 1.5 m is still well above the typical 1.5-2 m gap
      # between cusps in a single tightly-packed plan; combined with the
      # bridge's 500 ms cusp cooldown (extended below), the controller
      # has enough time to physically traverse one segment before the
      # carrot search reaches into the next one.
      max_robot_pose_search_dist: 1.5

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: false
      rolling_window: true
      width: 2
      height: 2
      resolution: 0.02  # 2cm resolution for small spaces
      # Rectangular Ackermann footprint (0.30 × 0.22 m centered on base_link).
      # NOTE: these two lines are COSMETIC — the launch files override both
      # footprint and footprint_padding from build_urdf.render()
      # (~/.autonexa/robot_dimensions.yaml or DEFAULT_DIMENSIONS). Edit the
      # size THERE; kept in sync here only so a raw YAML read isn't misleading.
      footprint: "[[0.15, 0.11], [0.15, -0.11], [-0.15, -0.11], [-0.15, 0.11]]"
      footprint_padding: 0.05
      plugins: ["obstacle_layer", "inflation_layer"]
      
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        # Raw /scan on purpose: the 4-stage scan-filter chain (/scan_filtered)
        # was removed 2026-05-20 (commit 454e156) for crashing on bring-up, so
        # /scan_filtered is not published. Do NOT point this at /scan_filtered
        # unless that filter node is re-introduced and verified.
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 2.5
          raytrace_min_range: 0.0
          obstacle_max_range: 2.0
          obstacle_min_range: 0.0
          # Ignore "inf" (no-return) rays so they don't spuriously mark or
          # clear cells — matches the global obstacle layer. Cuts phantom
          # obstacles from C1 noise without a filter chain.
          inf_is_valid: false

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # Lowered from 8.0 to 6.0: the steep gradient was causing RPP's
        # cost-regulated linear velocity scaling to chop the speed
        # response into pulses near walls, which presented as straight-
        # path snake. RPP no longer reads cost (use_cost_regulated…
        # disabled), so this only shapes how the planner_server's local
        # view inflates — kept at 6.0 for symmetry with global.
        cost_scaling_factor: 6.0
        # 0.18 m: real clearance halo. The previous 0.10 m was equal
        # to the chassis half-width, leaving the controller with zero
        # margin for localisation drift — any drift > 0 led to contact.
        # 0.18 m gives 8 cm of true free space beyond the chassis edge,
        # which is enough to absorb the ~5 cm scan-matcher drift seen
        # on featureless walls plus a 3 cm safety pad.
        # 0.18 -> 0.14 (2026-05-20): tighter halo so the planner can route
        # through the small room and closer to walls. Still > inscribed
        # (~0.13 for the 0.27x0.20 footprint + 0.03 pad).
        inflation_radius: 0.14

      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      # 5 Hz (was 1 Hz): newly-placed obstacles must hit the planner-side
      # grid within ~200 ms so the next BT replan tick (2 Hz) sees them
      # and re-routes. CPU cost on the Pi 5 at this map size is negligible.
      update_frequency: 5.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: false
      # Same rectangular footprint as local_costmap. COSMETIC — overridden
      # by the launch from build_urdf.render() (see local_costmap note).
      footprint: "[[0.15, 0.11], [0.15, -0.11], [-0.15, -0.11], [-0.15, 0.11]]"
      # 0.05 m: virtual margin around new dynamic obstacles AND walls.
      # New obstacles from the obstacle_layer below get NO inflation halo
      # (the layer runs AFTER inflation on purpose), so this padding is the
      # planner's built-in buffer per new obstacle. COSMETIC here — the
      # launch overrides it from build_urdf footprint_padding (also 0.05).
      footprint_padding: 0.05
      resolution: 0.05  # Coarser global grid for faster Hybrid-A* planning
      track_unknown_space: true
      # static_layer + keepout_filter own the long-term map; inflation runs
      # next and inflates ONLY those (the wall halo). obstacle_layer runs
      # LAST, writing lethal cells for live LIDAR returns without an
      # inflation halo. This is deliberate: it lets the planner avoid
      # newly-placed / dynamic obstacles, while avoiding the wall-halo
      # compounding bug that motivated removing the global live-scan
      # layer originally (chassis parked near a wall ended up inside an
      # inflated cell and the planner couldn't draw a leave-park path).
      plugins: ["static_layer", "keepout_filter", "inflation_layer", "obstacle_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        enabled: true

      # Road mask - blocks areas outside drawn roads
      keepout_filter:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_topic: /road_mask
        map_subscribe_transient_local: true
        subscribe_to_updates: false

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # Steeper than before (5.0 → 6.0) to push the planner further
        # away from inflated cells. The planner reads global cost; bigger
        # gradient = stronger "go around" bias.
        cost_scaling_factor: 6.0
        # 0.10 → 0.12 m for the planner. Global > local on purpose:
        # 0.22 m: planner-side halo, 4 cm bigger than local (0.18). Keeps
        # `global > local` so the planner stays farther from walls than
        # the controller is allowed to wander to. 4 cm of extra slack
        # absorbs the planner↔controller path-deviation introduced by
        # the actual driven turning radius being tighter than the
        # planner's minimum_turning_radius assumption.
        # 0.22 -> 0.16 (2026-05-20): tighter halo to draw paths near walls in
        # the small room; still > local (0.14) and > inscribed (~0.13).
        inflation_radius: 0.16

      # New-obstacle layer for the planner. Placed AFTER inflation on
      # purpose: walls keep their fat halo (from static + inflation), and
      # newly-observed LIDAR returns are written as bare lethal cells
      # with NO inflation. This avoids the wall-halo-compounding bug
      # that motivated removing the global obstacle layer originally
      # (chassis parked near a wall would otherwise sit inside an
      # inflated halo and the planner couldn't draw a leave-park path).
      # Margin around new obstacles comes from footprint_padding (0.04 m)
      # instead of inflation.
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: true
          clearing: true
          # Match local costmap's ranges. raytrace > obstacle so cells
          # the robot drives past get cleared at the edge of vision.
          obstacle_max_range: 2.0
          obstacle_min_range: 0.0
          raytrace_max_range: 2.5
          raytrace_min_range: 0.0
          max_obstacle_height: 2.0
          # Ignore "inf" returns so no-return rays don't spuriously mark
          # or clear cells.
          inf_is_valid: false

      always_send_full_costmap: true

# Keepout filter configuration (optional - use if you have a road mask)
# To enable: add "keepout_filter" to plugins list above
# keepout_filter:
#   plugin: "nav2_costmap_2d::KeepoutFilter"
#   enabled: true
#   filter_info_topic: "/costmap_filter_info"

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

planner_server:
  ros__parameters:
    expected_planner_frequency: 5.0
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner::SmacPlannerHybrid"
      tolerance: 0.10
      downsample_costmap: false
      allow_unknown: false
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      # Doubled (2 s → 4 s) so the planner has time to find complex K-turn
      # / 3-point park solutions on goals that demand them. Most goals
      # still finish well under 1 s; this just removes the artificial cap
      # that was making the planner give up before exploring cusp paths.
      max_planning_time: 4.0
      # REEDS_SHEPP for small-testbed work. DUBIN's forward-only paths
      # produced contorted loops that satisfied the goal-yaw constraint
      # but fit poorly inside a 2x2 m box. REEDS_SHEPP can emit a reverse
      # segment when needed, eliminating the visible "robot drives weird
      # circle" pattern the user reported. The cusp-tracking trade-off
      # (RPP follows reverse cusps less smoothly than forward arcs) is
      # acceptable for the parking use case; reverse_penalty: 2.0 below
      # still biases the planner toward forward solutions when both fit.
      motion_model_for_search: "REEDS_SHEPP"
      angle_quantization_bins: 72
      # Pulled even lower (2.5 → 2.0) so the planner attempts an exact
      # Reeds-Shepp closing earlier in the search — keeps final park
      # segment short and clean. Combined with the lower R_min this
      # makes 3-point park solutions much easier to find.
      analytic_expansion_ratio: 2.0
      analytic_expansion_max_length: 3.0
      # 2x2 m testbed reality: at R_min 1.00 m the turning *diameter* equals
      # the whole testbed width, so 180° goals had no room for a forward
      # arc — the planner just emitted a long single-segment reverse, and
      # 0.50 m: matches the chassis's real turning capability with a
      # 7 cm engineering margin above the geometric limit
      # R = L / tan(δ_max) = 0.25 / tan(0.5236) ≈ 0.43 m. The previous
      # 0.85 m was ~2× the real R_min, causing the planner to draw
      # gentle arcs while the controller drove tighter actual curves —
      # the chassis deviated from the planned line and ended up inside
      # the inflation halo on every turn. With 0.50 m the planner and
      # controller agree on geometry, eliminating the corner-cutting
      # contact pattern.
      minimum_turning_radius: 0.50
      # 1.2 → 1.5 on 2026-05-13, then 1.5 → 3.0 on 2026-06-01: the car was
      # still reversing straight to the goal and only turning once parked
      # instead of driving a forward arc that turns while approaching. 3.0
      # strongly biases the planner to forward curved approaches; reverse is
      # kept only as a last resort for genuinely tight geometry (Reeds-Shepp
      # still permits it). Pull back toward 1.5–2.0 if real 3-point park
      # goals start failing because reverse got too expensive.
      reverse_penalty: 3.0
      # 0.4 → 0.6 (2026-05-13), then 0.6 → 1.0 (2026-06-01): each direction
      # change (cusp) now costs more, so the planner prefers fewer-cusp
      # solutions — a forward arc wins over a cusp-heavy K-turn even when the
      # arc is somewhat longer. Directly attacks the "many maneuvers" symptom
      # at the per-plan level (paired with reverse_penalty 3.0). Pull back
      # toward 0.6 if legitimate tight 3-point parks stop being found.
      change_penalty: 1.0
      # 1.05 (was briefly 1.0 in V2). A small straight-line bias gives
      # the A* heuristic a clearer "prefer straight when straight fits"
      # signal, which translates to faster planning and fewer empty
      # /plan emissions. Tight enough that real curve solutions still win.
      non_straight_penalty: 1.05
      cost_penalty: 1.5
      retrospective_penalty: 0.015
      lookup_table_size: 20.0
      cache_obstacle_heuristic: true
      smooth_path: true
      smoother:
        max_iterations: 1000
        # 0.5 → 0.7 / 0.1 → 0.05 on 2026-05-13: operator said "I prefer
        # longer, smoother paths over the planner's shortest-path bias".
        # Heavier smoothing weight + lower waypoint-fidelity weight lets
        # the post-smoother round corners more aggressively, even at the
        # cost of drifting further from the raw A* sample sequence. The
        # underlying A* still picks the same cells; the smoother just
        # takes more freedom in how to fit a curve through them.
        w_smooth: 0.7
        w_data: 0.05
        tolerance: 1.0e-10

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    # Ackermann chassis: `spin` is geometrically impossible (front-wheel
    # steer, rear-wheel drive — no in-place rotation). Removed from the
    # recovery list so every BT recovery cycle no longer burns one tick
    # on a guaranteed-fail behavior. BackUp + Wait remain useful: BackUp
    # un-wedges from inflated corners, Wait gives moving obstacles time
    # to clear.
    behavior_plugins: ["backup", "wait"]
    backup:
      plugin: "nav2_behaviors::BackUp"
    wait:
      plugin: "nav2_behaviors::Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200  # 200ms pause at each waypoint

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"

    # Lockstep with MPPI vx_max/RPP cruise and the bridge cap.
    max_velocity: [0.25, 0.0, 0.5]
    min_velocity: [-0.20, 0.0, -0.5]
    # Fast enough to pass the bridge's 0.10 m/s creep gate quickly.
    max_accel: [0.60, 0.0, 0.50]
    max_decel: [-1.0, 0.0, -1.0]
    odom_topic: "odom"
    odom_duration: 0.1
    # Suppress commands the floor-loaded drivetrain cannot turn into useful
    # motion; the bridge's 0.10 m/s gate is the final hard cutoff.
    deadband_velocity: [0.08, 0.0, 0.0]
    velocity_timeout: 1.0

collision_monitor:
  ros__parameters:
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel_safe"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    # Two-layer, direction-aware safety:
    #   1. DirectionalStop — velocity-aware polygon. Hard stop when the
    #      polygon matching the *current direction of motion* sees enough
    #      LiDAR points. When the robot is parked against a wall and Nav2
    #      commands reverse, only the reverse polygon (which sees free
    #      space behind the chassis) is consulted — the wall in front is
    #      ignored. This is the fix for the "wall-stall" pattern.
    #   2. FootprintApproach — gentler outer layer that scales velocity
    #      down before DirectionalStop hard-stops. Keeps the chassis from
    #      barrelling into walls during parking approach.
    polygons: ["DirectionalStop", "FootprintApproach"]
    DirectionalStop:
      type: "velocity_polygon"
      action_type: "stop"
      # 8 → 5: the previous bump was over-tightened. At oblique wall
      # angles only 5–6 rays land inside the polygon and 8 was rejecting
      # real walls (a contributor to "didn't slow down before crash").
      # 5 still filters single-scan spec noise but catches the real
      # geometry reliably.
      min_points: 5
      visualize: true
      enabled: true
      holonomic: false
      velocity_polygons: ["forward", "reverse", "stopped"]
      # Chassis: 30 cm long × 22 cm wide, centered on base_link.
      # Front edge at x=+0.15, rear edge at x=-0.15, sides at y=±0.11.
      forward:
        # 12 cm bumper (x: 0.15 → 0.27) — deepened from 8 cm and re-anchored
        # to the new 0.30 m chassis front (was x=0.135). Because the L298N
        # has no active brake (l298n_stop_all() coasts), real stop distance
        # is dominated by coast, not by commanded decel; the deeper bumper
        # buys coast + IPC/planner latency margin. RPP's own
        # use_collision_detection is off, so this polygon is the only
        # forward safety stop. Width ±0.12 (slightly past the 0.11
        # half-width) catches oblique walls.
        # `linear_min: 0.05` carves a creep window: when the chassis
        # is wall-adjacent and commanded vx < 5 cm/s, this polygon
        # doesn't fire — so paths can execute even from poses parked
        # next to walls. Above 5 cm/s the bumper applies normally.
        points: "[[0.27, 0.12], [0.27, -0.12], [0.15, -0.12], [0.15, 0.12]]"
        linear_min: 0.05
        linear_max: 1.0
        theta_min: -1.0
        theta_max: 1.0
      reverse:
        # Symmetric 12 cm bumper behind the chassis (x: -0.15 → -0.27),
        # re-anchored to the new 0.30 m chassis rear and deepened to match
        # the forward bumper (3-point parks reverse toward walls too). Same
        # coast-dominated stop-distance reasoning applies in reverse.
        # The matching -0.05 creep gate still lets reverse break out
        # of wall-adjacent parking poses at sub-5 cm/s.
        points: "[[-0.15, 0.12], [-0.15, -0.12], [-0.27, -0.12], [-0.27, 0.12]]"
        linear_min: -1.0
        linear_max: -0.05
        theta_min: -1.0
        theta_max: 1.0
      stopped:
        # Exact chassis footprint (0.30 × 0.22) — only fires if we somehow
        # ended up *inside* an obstacle while stationary (sanity check).
        points: "[[0.15, 0.11], [0.15, -0.11], [-0.15, -0.11], [-0.15, 0.11]]"
        linear_min: -0.01
        linear_max: 0.01
        theta_min: -1.0
        theta_max: 1.0
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      # 0.6 s slow-down window (was 1.0 s). The longer window projected the
      # footprint along a *curved* twist far enough that, on a bend in a
      # narrow lane, the rotating footprint corners swept into a side wall —
      # scaling speed toward zero on walls the chassis would simply pass.
      # 0.6 s still begins the gentle slow-down well before DirectionalStop's
      # 12 cm hard stop fires; at the 0.08 m/s cruise the stopping distance
      # under the 1.0 m/s² decel cap is sub-cm, so margin is ample.
      time_before_collision: 0.6
      simulation_time_step: 0.1
      # Require 8 laser points inside the projected footprint before
      # acting. At 2 cm costmap resolution with the LiDAR's angular
      # density, isolated noise hits could clear a lower threshold and
      # slam the brakes for nothing.
      min_points: 8
      visualize: false
      enabled: true
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "scan"
      min_height: 0.0
      max_height: 2.0
      enabled: true
