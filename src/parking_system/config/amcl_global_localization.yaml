amcl:
  ros__parameters:
    # ============================================
    # FRAME CONFIGURATION
    # ============================================
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    global_frame_id: "map"
    scan_topic: "/scan"
    
    # ============================================
    # PARTICLE FILTER - HIGH COUNT FOR GLOBAL LOCALIZATION
    # ============================================
    # More particles = better coverage of the map for global localization
    min_particles: 2000      # Start with dense cloud
    max_particles: 10000     # Allow huge spread for global recovery
    
    # Particle filter resampling
    resample_interval: 1     # Resample every update
    
    # Recovery parameters (for when localization is lost)
    recovery_alpha_slow: 0.001
    recovery_alpha_fast: 0.1
    
    # ============================================
    # UPDATE FREQUENCY - VERY RESPONSIVE
    # ============================================
    # Update filter frequently for fast convergence
    update_min_d: 0.05       # Update every 5cm of movement
    update_min_a: 0.05       # Update every ~3 degrees of rotation
    
    # ============================================
    # LASER MODEL - TUNED FOR 2x2m TESTBED
    # ============================================
    laser_model_type: "likelihood_field"
    
    # Laser range settings (for 2x2m, we don't need long range)
    laser_max_range: 4.0     # 4m is enough for 2x2m testbed
    laser_min_range: 0.05    # 5cm minimum
    max_beams: 60            # Use 60 beams for good coverage
    
    # Likelihood field parameters
    laser_likelihood_max_dist: 2.0   # Max distance to find correspondence
    sigma_hit: 0.1           # Smaller = more precise matching (good for small space)
    
    # Laser model weights - TRUST THE LASER
    z_hit: 0.9               # 90% weight on laser hits (high trust)
    z_rand: 0.1              # 10% random noise tolerance
    z_max: 0.05              # Low weight for max range readings
    z_short: 0.05            # Low weight for short readings
    
    # ============================================
    # ODOMETRY MODEL - FOR LASER SCAN MATCHER
    # ============================================
    # Since laser_scan_matcher provides relatively precise local odometry,
    # we use low alpha values (high trust in odometry)
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    
    # Odometry noise parameters (lower = more trust in odometry)
    # For laser scan matcher which is locally precise:
    alpha1: 0.05    # Rotation noise from rotation (low - trust scan matcher)
    alpha2: 0.05    # Rotation noise from translation
    alpha3: 0.05    # Translation noise from translation
    alpha4: 0.05    # Translation noise from rotation
    alpha5: 0.05    # Translation noise
    
    # ============================================
    # TF SETTINGS
    # ============================================
    tf_broadcast: true       # Publish map->odom transform
    transform_tolerance: 0.5 # TF tolerance in seconds
    
    # ============================================
    # INITIAL POSE (for 2x2m testbed - start near center)
    # ============================================
    set_initial_pose: true
    initial_pose_x: 0.0
    initial_pose_y: 0.0
    initial_pose_yaw: 0.0
    initial_pose_a: 0.5      # Initial covariance
    
    # ============================================
    # GLOBAL LOCALIZATION SETTINGS
    # ============================================
    # These help with global localization convergence
    always_reset_initial_pose: false
    first_map_only: true     # Only use first map received

