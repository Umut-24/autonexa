slam_toolbox:
  ros__parameters:
    # ============================================
    # BASIC PARAMETERS
    # ============================================
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    provide_odom_frame: false  # CRITICAL: Use external odometry from laser scan matcher
    publish_tf: true
    transform_publish_period: 0.01  # 100Hz transform publishing for better timing
    scan_topic: /scan_filtered  # Use filtered scan for better quality
    
    # ============================================
    # TF BUFFER SETTINGS (Fix message filter queue issues)
    # ============================================
    # Increase buffer duration to handle timing issues
    # This allows SLAM to process scans even if transforms arrive slightly late
    tf_buffer_duration: 30.0  # Buffer duration in seconds (increased for timing tolerance)
    
    # ============================================
    # MAP UPDATE PARAMETERS (Optimized for 2m x 2m)
    # ============================================
    map_update_interval: 0.5  # Update map every 0.5s
    
    # ============================================
    # RESOLUTION PARAMETERS (Optimized for 2m x 2m indoor)
    # ============================================
    resolution: 0.02  # 2cm per pixel - optimal balance for 2m x 2m indoor environment
    
    # ============================================
    # MAP SIZE PARAMETERS (Optimized for 2m x 2m)
    # ============================================
    max_laser_range: 4.0  # For 2m x 2m, 4m range is sufficient (diagonal is ~2.8m)
    minimum_travel_distance: 0.05  # Process if moved 5cm (use odometry for movement detection)
    minimum_travel_heading: 0.0873  # Process if rotated 5 degrees
    
    # ============================================
    # SCAN MATCHING PARAMETERS (Tuned for stability and quality)
    # ============================================
    scan_buffer_size: 40  # Larger buffer for better matching and loop closure
    scan_buffer_maximum_scan_distance: 3.0  # For 2m x 2m map
    link_match_minimum_response_fine: 0.25  # Higher threshold for better matches (reduces false matches)
    link_scan_maximum_distance: 1.5  # Maximum distance for linking scans
    loop_search_maximum_distance: 2.5  # For 2m x 2m map (diagonal ~2.8m)
    do_loop_closing: true  # Enable loop closure for better map consistency
    loop_match_minimum_chain_size: 10  # Minimum chain size for loop closure
    loop_match_maximum_variance_coarse: 3.0  # Maximum variance for coarse loop matching
    loop_match_minimum_response_coarse: 0.4  # Higher threshold for loop closure
    loop_match_minimum_response_fine: 0.5  # Higher threshold for fine loop matching
    
    # ============================================
    # CORRELATION PARAMETERS (Tuned for sharp walls and reduced drift)
    # ============================================
    correlation_search_space_dimension: 0.3  # Search space for scan matching (30cm)
    correlation_search_space_resolution: 0.01  # 1cm resolution for precise matching
    correlation_search_space_smear_deviation: 0.015  # Smear deviation (range: 0.001-0.02) - lower = sharper
    
    # ============================================
    # LOOP CLOSURE PARAMETERS (Tuned for 2m x 2m)
    # ============================================
    loop_search_space_dimension: 3.0  # Search space for loop closure (3m covers 2m x 2m)
    loop_search_resolution: 0.05  # 5cm resolution for loop closure
    loop_search_space_smear_deviation: 0.05  # Smear deviation for loop closure (range: 0.025-0.5)
    
    # ============================================
    # DISTANCE/ANGLE VARIANCE PENALTIES (Reduce drift and distortion)
    # ============================================
    distance_variance_penalty: 1.2  # Higher penalty = straighter walls, less drift
    angle_variance_penalty: 1.8  # Higher penalty = better angle consistency, less rotation drift
    
    # ============================================
    # FINE SEARCH PARAMETERS (Tuned for precision)
    # ============================================
    fine_search_angle_offset: 0.00175  # 0.1 degree fine search
    coarse_search_angle_offset: 0.1745  # 10 degree coarse search
    coarse_angle_resolution: 0.01745  # 1 degree angle resolution
    
    # ============================================
    # MINIMUM PENALTIES
    # ============================================
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    
    # ============================================
    # SCAN MATCHING SETTINGS
    # ============================================
    use_scan_matching: true
    use_scan_barycenter: true
    minimum_time_interval: 0.1  # Process scans every 100ms (10Hz) - use odometry for high-frequency updates
    
    # ============================================
    # MAP PUBLISHING
    # ============================================
    publish_map_updates: true
    enable_interactive_mode: false
    scan_queue_size: 50  # Increased queue to handle scan bursts and timing issues

