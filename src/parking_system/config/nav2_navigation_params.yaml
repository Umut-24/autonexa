# Nav2 Parameters for Parking Navigation System
# Optimized for small-scale indoor environment (1-2m areas)
# Supports road mask/keepout zones

amcl:
  ros__parameters:
    use_sim_time: false
    
    # Frame configuration
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    global_frame_id: "map"
    scan_topic: "/scan"
    
    # UPDATE RATE - VERY FREQUENT FOR SMALL SPACE
    update_min_d: 0.02       # Update every 2cm
    update_min_a: 0.05       # Update every ~3 degrees
    
    # RESAMPLING - FAST CONVERGENCE
    resample_interval: 1     # Resample every update
    
    # PARTICLE FILTER - DENSE FOR GLOBAL LOCALIZATION
    min_particles: 5000      # Dense cloud
    max_particles: 10000     # Wide coverage
    pf_err: 0.01             # Lower error threshold
    pf_z: 0.99               # High confidence required
    
    # RECOVERY - AGGRESSIVE
    recovery_alpha_slow: 0.0     # Disable slow recovery
    recovery_alpha_fast: 0.1     # Fast recovery
    
    # LASER MODEL - AGGRESSIVE MATCHING (TRUST LASER!)
    laser_model_type: "likelihood_field_prob"
    laser_max_range: 8.0
    laser_min_range: 0.05
    max_beams: 180           # Use ALL beams for shape matching
    
    # LIKELIHOOD FIELD - WIDE ATTRACTION
    sigma_hit: 0.1           # 10cm acceptance radius
    laser_likelihood_max_dist: 8.0   # Search entire room
    
    # LASER MODEL WEIGHTS - TRUST GEOMETRY
    z_hit: 0.9               # Trust laser hits!
    z_rand: 0.1              # Allow some noise
    z_short: 0.0
    z_max: 0.0
    
    # BEAM SKIP - DISABLED FOR GLOBAL LOCALIZATION
    do_beamskip: false       # Use ALL beams
    
    # ODOMETRY MODEL
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    
    # TF SETTINGS
    tf_broadcast: true
    transform_tolerance: 1.0
    
    # INITIAL POSE - DISABLED FOR GLOBAL LOCALIZATION
    set_initial_pose: false
    always_reset_initial_pose: false
    first_map_only: true

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    # Only load NavigateToPose. The default NavigateThroughPoses tree invokes
    # Spin recovery; Spin is intentionally not launched for this Ackermann
    # chassis, so loading that navigator keeps bt_navigator from activating.
    navigators: ["navigate_to_pose"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    # Ackermann-aware BT with a periodic ComputePathToPose tick (RateController
    # hz=1.0) so the planner re-evaluates every second — recovers automatically
    # when collision_monitor stalls the chassis but the existing path is still
    # nominally valid. The launch file rewrites this absolute path against the
    # actual install share at runtime.
    default_nav_to_pose_bt_xml: "/opt/ros/jazzy/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml"
    enable_groot_monitoring: false

controller_server:
  ros__parameters:
    use_sim_time: false
    # 20 Hz keeps RPP responsive on tight curves where each 10 Hz tick was
    # ~3 cm of travel — non-trivial when the lookahead floor sits near R_min.
    # RPP is cheap (no trajectory sampling) so the Pi5 has the headroom.
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 10.0
    
    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      # 15 cm: mildly stricter than the earlier 20 cm stop window, but still
      # loose enough to avoid hunting in the small testbed.
      xy_goal_tolerance: 0.15
      # 0.12 rad (~7°): loosened from 0.10 to give the Ackermann chassis a
      # realistic chance of settling without a cusp-correct cusp-correct
      # loop. With the new 1.00 m R_min the wheels need every degree of
      # tolerance they can get on a goal yaw.
      yaw_goal_tolerance: 0.12
    
    # Regulated Pure Pursuit - Ackermann-friendly path tracking.
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      # 0.12 m/s default — precision-first for the 2x2 m testbed. The
      # previous 0.20 m/s amplified every steering imperfection (MG995
      # rotor mismatch, asymmetric linkage) into visible snake; halving
      # the speed gives the regulator more time per tick to react. User
      # can live-tune via Settings -> Nav2 Max Speed slider; that
      # rewrites this in runtime_overrides.yaml.
      desired_linear_vel: 0.12

      # Lookahead set so the carrot always sits *outside* the chassis
      # footprint (front edge at +0.15 m). With min_lookahead_dist=0.14
      # the carrot fell inside the footprint at low speed and RPP read it
      # as "we're already there" → bang-bang yaw → snake.
      lookahead_dist: 0.22
      min_lookahead_dist: 0.20
      max_lookahead_dist: 0.35
      use_velocity_scaled_lookahead_dist: true
      # Cap the velocity-scaled carrot lookahead time so it does not run
      # the carrot far ahead of the chassis. Was implicitly 1.0 s (Nav2
      # default), which at the old 0.20 m/s let the carrot drift 0.20 m
      # past the geometric clamp — RPP then over-corrected curvature.
      lookahead_time: 0.5
      # Curvature carrot used for steering command (separate from the
      # main lookahead). Match the steady-state lookahead so steering
      # commands stay smooth on long straights.
      curvature_lookahead_dist: 0.20
      transform_tolerance: 0.2
      use_collision_detection: true
      # Tightened from 1.2 s to 0.6 s so RPP only zeros velocity when an
      # imminent collision is actually predicted, not whenever the carrot
      # passes within 1.2 s of nearby (but legal-to-skirt) wall inflation.
      # This is the "plan-shown-but-robot-frozen" symptom near walls.
      max_allowed_time_to_collision_up_to_carrot: 0.6
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: true
      # Lower scaling gain + slightly shorter cost-decay distance so RPP
      # stops oscillating speed in response to costmap noise while still
      # slowing for genuinely high-cost zones.
      cost_scaling_dist: 0.45
      cost_scaling_gain: 0.7
      # Start slowing at 1.40 m curvature radius — keeps roughly the same
      # ~1.4× margin above the planner's R_min that we used before (R_min
      # is now 1.00 m, see planner_server below). Update this in lockstep
      # whenever minimum_turning_radius moves.
      regulated_linear_scaling_min_radius: 1.40

      # Curve-floor speed lowered from 0.18 to 0.06 m/s so the regulator
      # is allowed to crawl through tight curves and final-approach
      # cusps. The bridge's min_vx_creep (0.02 m/s) still gates anything
      # below the chassis's L298N deadband, so we don't get stalled
      # commands — we just expose the slower band that the bridge can
      # actually drive.
      regulated_linear_scaling_min_speed: 0.06
      # Begin slowing 0.6 m before the goal (was Nav2 default 0.6 m, but
      # not explicitly set — pin it so future Nav2 changes don't silently
      # drift the value). Combined with min_approach_linear_velocity
      # below this gives a smooth final-approach taper that lets a
      # parking maneuver settle without one last over-shoot.
      approach_velocity_scaling_dist: 0.60
      # Floor the approach speed at 0.04 m/s (was implicit 0.05). With
      # the chassis's L298N kick-start the wheels still move at this
      # level, but only just — which is what we want during the last
      # few centimeters of a parking approach.
      min_approach_linear_velocity: 0.04
      # Ackermann chassis: no rotate-in-place. Reversing IS allowed (paired
      # with the planner's REEDS_SHEPP default below) — on a 2x2 m testbed
      # DUBIN's forward-only paths produced contorted loops that satisfied
      # the goal-yaw constraint but fit poorly inside the box. Allowing
      # reverse + REEDS_SHEPP lets the planner emit a clean K-turn or
      # back-into-pose segment when needed; the cusp-tracking trade-off is
      # acceptable for parking-style maneuvers in tight spaces.
      use_rotate_to_heading: false
      allow_reversing: true
      # Raised from 1.0 m to 3.0 m so RPP can find the next path segment
      # across REEDS_SHEPP cusps that may be 1.5-2 m apart along the plan
      # arc even if their XY positions remain inside the 2x2 m testbed.
      # The earlier 1.0 m clamp made multi-point parallel-park plans
      # un-followable: after the first cusp, RPP couldn't reach the next
      # segment and re-latched onto the first, looping. Cusp tracking is
      # protected separately by the bridge's 250 ms cusp cooldown.
      max_robot_pose_search_dist: 3.0

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: false
      rolling_window: true
      width: 2
      height: 2
      resolution: 0.02  # 2cm resolution for small spaces
      # Rectangular Ackermann footprint matches the URDF collision box
      # (0.30 × 0.20 m centered on base_link). Using a circle (robot_radius)
      # underestimated the chassis length and overestimated the width,
      # which mismatched the global costmap (12 cm inflation) and made
      # tight perpendicular goals look reachable to the planner but
      # blocked to the controller.
      footprint: "[[0.15, 0.10], [0.15, -0.10], [-0.15, -0.10], [-0.15, 0.10]]"
      footprint_padding: 0.01
      plugins: ["obstacle_layer", "inflation_layer"]
      
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 2.5
          raytrace_min_range: 0.0
          obstacle_max_range: 2.0
          obstacle_min_range: 0.0
      
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # Lowered from 8.0 to 6.0: the steep gradient was causing RPP's
        # cost-regulated linear velocity scaling to chop the speed
        # response into pulses near walls, which presented as straight-
        # path snake. 6.0 still decays in ~3-4 cells past the 5 cm
        # halo — enough margin without the abrupt cliff.
        cost_scaling_factor: 6.0
        # Precision-testbed default: 5 cm scan/wall halo.
        inflation_radius: 0.05

      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: false
      # Same rectangular footprint as local_costmap. Keeps planner +
      # controller in lockstep about what fits.
      footprint: "[[0.15, 0.10], [0.15, -0.10], [-0.15, -0.10], [-0.15, 0.10]]"
      footprint_padding: 0.01
      resolution: 0.05  # Coarser global grid for faster Hybrid-A* planning
      track_unknown_space: true
      # Plugins: static map, road mask (keepout), obstacles, inflation
      plugins: ["static_layer", "keepout_filter", "obstacle_layer", "inflation_layer"]
      
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        enabled: true
      
      # Road mask - blocks areas outside drawn roads
      keepout_filter:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_topic: /road_mask
        map_subscribe_transient_local: true
        subscribe_to_updates: false
      
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.05
      
      always_send_full_costmap: true

# Keepout filter configuration (optional - use if you have a road mask)
# To enable: add "keepout_filter" to plugins list above
# keepout_filter:
#   plugin: "nav2_costmap_2d::KeepoutFilter"
#   enabled: true
#   filter_info_topic: "/costmap_filter_info"

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

planner_server:
  ros__parameters:
    expected_planner_frequency: 5.0
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner::SmacPlannerHybrid"
      tolerance: 0.10
      downsample_costmap: false
      allow_unknown: false
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 2.0
      # REEDS_SHEPP for small-testbed work. DUBIN's forward-only paths
      # produced contorted loops that satisfied the goal-yaw constraint
      # but fit poorly inside a 2x2 m box. REEDS_SHEPP can emit a reverse
      # segment when needed, eliminating the visible "robot drives weird
      # circle" pattern the user reported. The cusp-tracking trade-off
      # (RPP follows reverse cusps less smoothly than forward arcs) is
      # acceptable for the parking use case; reverse_penalty: 2.0 below
      # still biases the planner toward forward solutions when both fit.
      motion_model_for_search: "REEDS_SHEPP"
      angle_quantization_bins: 72
      # Pull the analytic-expansion ratio down so the planner attempts
      # an exact Reeds-Shepp closing earlier in the search. Helps the
      # final park segment stay short and clean instead of one long
      # arc that the controller needs many ticks to track.
      analytic_expansion_ratio: 2.5
      analytic_expansion_max_length: 3.0
      # MG995 + Hiwonder Ackermann linkage delivers a much wider effective
      # R_min than the firmware's design intent (which assumed a 240°+ rotor
      # smart servo). The previous 0.45 m value was based on an idealized
      # L/tan(30°) ≈ 0.43 m calculation that does not survive the rotor-range
      # mismatch — empirically the chassis can't follow tighter-than-~0.9 m
      # arcs, which made every planner primitive un-trackable and produced
      # the snake/overshoot/yaw-oscillation pattern. Conservative starting
      # value: 1.00 m. Reduce iteratively in 0.05 m steps (down to ~0.80 m)
      # as long as the controller keeps following the path without snake.
      minimum_turning_radius: 1.00
      # Raise reverse penalty to 1.8 — still permits 3-point parallel-park
      # solutions, but discourages the planner from emitting gratuitous
      # reverse cusps on simple goals where a wider forward arc fits the
      # 2x2 m testbed just fine. Reduces the in-place oscillation we saw
      # when the planner inserted a reverse segment to nail the goal yaw.
      reverse_penalty: 1.8
      change_penalty: 0.5
      # Soften the straight-line bias slightly now that R_min is 1.00 m;
      # with the wider radius the planner needs to be willing to curve
      # more freely or the path snakes around obstacles.
      non_straight_penalty: 1.05
      cost_penalty: 1.5
      retrospective_penalty: 0.015
      lookup_table_size: 20.0
      cache_obstacle_heuristic: true
      smooth_path: true
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    # Ackermann chassis: `spin` is geometrically impossible (front-wheel
    # steer, rear-wheel drive — no in-place rotation). Removed from the
    # recovery list so every BT recovery cycle no longer burns one tick
    # on a guaranteed-fail behavior. BackUp + Wait remain useful: BackUp
    # un-wedges from inflated corners, Wait gives moving obstacles time
    # to clear.
    behavior_plugins: ["backup", "wait"]
    backup:
      plugin: "nav2_behaviors::BackUp"
    wait:
      plugin: "nav2_behaviors::Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200  # 200ms pause at each waypoint

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"

    # vx cap dropped 0.20 -> 0.15 m/s in lockstep with the controller's
    # new 0.12 m/s desired_linear_vel — leaves a small headroom for the
    # cost-based scaling to add speed but doesn't let runaway commands
    # slip past the smoother. wz cap unchanged (0.5 rad/s).
    max_velocity: [0.15, 0.0, 0.5]
    min_velocity: [-0.3, 0.0, -0.5]
    # Acceleration caps tightened (was 1.5/2.0) so the smoother doesn't
    # paper over the bridge's own 0.5/0.7 caps with much faster ramps.
    # Snake/overshoot fell out of the smoother spiking commands the
    # bridge then had to undo. Decel cap left aggressive (1.5 m/s^2,
    # 1.5 rad/s^2) so safety stops still happen quickly.
    max_accel: [0.20, 0.0, 0.45]
    max_decel: [-1.5, 0.0, -1.5]
    odom_topic: "odom"
    odom_duration: 0.1
    # Smoother deadband removed — let small velocities through. The
    # bridge's own min_vx_creep (0.02 m/s) handles the final gate.
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

collision_monitor:
  ros__parameters:
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel_safe"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    polygons: ["FootprintApproach"]
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      # 0.7 s outer-layer brake — keeps collision_monitor slightly more
      # permissive than RPP's own 0.6 s collision lookahead so the outer
      # layer never triggers before the inner layer has had a chance to
      # react. At the new 0.12 m/s cruise that's ~8 cm forward projection,
      # plenty given the 1.5 m/s^2 decel cap.
      time_before_collision: 0.7
      simulation_time_step: 0.1
      # Require 8 laser points inside the projected footprint before
      # acting (was 6). At 2 cm costmap resolution with the LiDAR's
      # angular density, isolated noise hits could clear the old 6-point
      # threshold and slam the brakes for nothing.
      min_points: 8
      visualize: false
      enabled: true
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "scan"
      min_height: 0.0
      max_height: 2.0
      enabled: true
