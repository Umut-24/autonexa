# Nav2 Parameters for Parking Navigation System
# Optimized for small-scale indoor environment (1-2m areas)
# Supports road mask/keepout zones

amcl:
  ros__parameters:
    use_sim_time: false
    
    # Frame configuration
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    global_frame_id: "map"
    scan_topic: "/scan"
    
    # UPDATE RATE - VERY FREQUENT FOR SMALL SPACE
    update_min_d: 0.02       # Update every 2cm
    update_min_a: 0.05       # Update every ~3 degrees
    
    # RESAMPLING - FAST CONVERGENCE
    resample_interval: 1     # Resample every update
    
    # PARTICLE FILTER - DENSE FOR GLOBAL LOCALIZATION
    min_particles: 5000      # Dense cloud
    max_particles: 10000     # Wide coverage
    pf_err: 0.01             # Lower error threshold
    pf_z: 0.99               # High confidence required
    
    # RECOVERY - AGGRESSIVE
    recovery_alpha_slow: 0.0     # Disable slow recovery
    recovery_alpha_fast: 0.1     # Fast recovery
    
    # LASER MODEL - AGGRESSIVE MATCHING (TRUST LASER!)
    laser_model_type: "likelihood_field_prob"
    laser_max_range: 8.0
    laser_min_range: 0.05
    max_beams: 180           # Use ALL beams for shape matching
    
    # LIKELIHOOD FIELD - WIDE ATTRACTION
    sigma_hit: 0.1           # 10cm acceptance radius
    laser_likelihood_max_dist: 8.0   # Search entire room
    
    # LASER MODEL WEIGHTS - TRUST GEOMETRY
    z_hit: 0.9               # Trust laser hits!
    z_rand: 0.1              # Allow some noise
    z_short: 0.0
    z_max: 0.0
    
    # BEAM SKIP - DISABLED FOR GLOBAL LOCALIZATION
    do_beamskip: false       # Use ALL beams
    
    # ODOMETRY MODEL
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    
    # TF SETTINGS
    tf_broadcast: true
    transform_tolerance: 1.0
    
    # INITIAL POSE - DISABLED FOR GLOBAL LOCALIZATION
    set_initial_pose: false
    always_reset_initial_pose: false
    first_map_only: true

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    enable_groot_monitoring: false

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 10.0
    
    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.05  # 5cm tolerance for parking spots
      yaw_goal_tolerance: 0.1  # ~6 degrees
    
    # DWB Local Planner - optimized for small spaces
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: false
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.3  # Slow for precise parking
      max_vel_y: 0.0
      max_vel_theta: 0.5
      min_speed_xy: 0.0
      max_speed_xy: 0.3
      min_speed_theta: 0.0
      acc_lim_x: 1.5
      acc_lim_y: 0.0
      acc_lim_theta: 2.0
      decel_lim_x: -1.5
      decel_lim_y: 0.0
      decel_lim_theta: -2.0
      vx_samples: 20
      vy_samples: 1
      vtheta_samples: 20
      sim_time: 1.5
      linear_granularity: 0.02
      angular_granularity: 0.02
      transform_tolerance: 0.2
      xy_goal_tolerance: 0.05
      trans_stopped_velocity: 0.1
      short_circuit_trajectory_evaluation: true
      stateful: true
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.scale: 24.0
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: false
      rolling_window: true
      width: 2
      height: 2
      resolution: 0.02  # 2cm resolution for small spaces
      robot_radius: 0.1
      plugins: ["obstacle_layer", "inflation_layer"]
      
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 2.5
          raytrace_min_range: 0.0
          obstacle_max_range: 2.0
          obstacle_min_range: 0.0
      
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.2
      
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: false
      robot_radius: 0.1
      resolution: 0.02  # Match map resolution
      track_unknown_space: true
      # Plugins: static map, road mask (keepout), obstacles, inflation
      plugins: ["static_layer", "keepout_filter", "obstacle_layer", "inflation_layer"]
      
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        enabled: true
      
      # Road mask - blocks areas outside drawn roads
      keepout_filter:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_topic: /road_mask
        map_subscribe_transient_local: true
        subscribe_to_updates: false
      
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.15
      
      always_send_full_costmap: true

# Keepout filter configuration (optional - use if you have a road mask)
# To enable: add "keepout_filter" to plugins list above
# keepout_filter:
#   plugin: "nav2_costmap_2d::KeepoutFilter"
#   enabled: true
#   filter_info_topic: "/costmap_filter_info"

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

planner_server:
  ros__parameters:
    expected_planner_frequency: 5.0
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.05  # 5cm tolerance
      use_astar: true  # A* is better for small spaces
      allow_unknown: false

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    wait:
      plugin: "nav2_behaviors::Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.5
    min_rotational_vel: 0.1
    rotational_acc_lim: 1.5

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200  # 200ms pause at each waypoint

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.3, 0.0, 0.5]
    min_velocity: [-0.3, 0.0, -0.5]
    max_accel: [1.5, 0.0, 2.0]
    max_decel: [-1.5, 0.0, -2.0]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

