slam_toolbox:
  ros__parameters:
    # ============================================
    # MAPPING MODE - START FRESH (NO OLD MAPS)
    # ============================================
    mode: mapping                    # MAPPING mode, not localization
    map_file_name: ''                # EMPTY = don't load any map
    map_start_pose: [0.0, 0.0, 0.0]  # Start at origin
    map_start_at_dock: false         # Don't try to find dock position
    
    # ============================================
    # BASIC FRAME CONFIGURATION
    # ============================================
    base_frame: base_link
    odom_frame: odom
    map_frame: map
    scan_topic: /scan
    
    # ============================================
    # CRITICAL: Use external odometry from laser_scan_matcher
    # ============================================
    provide_odom_frame: false  # Let laser_scan_matcher provide odom->base_link
    publish_tf: true
    use_sim_time: false  # Real hardware, not simulation
    
    # ============================================
    # HIGH RESPONSIVENESS SETTINGS
    # ============================================
    # Lower thresholds = more frequent map updates. Tightened 0.05 → 0.03
    # on 2026-05-13 in lockstep with the laser_scan_matcher kf_dist drop —
    # SLAM only refines as often as the upstream odom emits keyframes, so
    # both layers need to stay in step.
    minimum_travel_distance: 0.03  # Update every 3 cm
    minimum_travel_heading: 0.03   # Update every ~1.7°
    map_update_interval: 1.0       # Try to update map every second

    # ============================================
    # TF TOLERANCE SETTINGS (prevent extrapolation errors)
    # ============================================
    # 0.5 → 0.2 s: extrapolation tolerance shouldn't outrun one scan period
    # (~100 ms at 10 Hz LiDAR). The old 0.5 s was masking real TF lag as
    # silently-extrapolated "good" transforms, which presented as the green
    # scan dots gradually walking off the static black map.
    transform_timeout: 0.2
    tf_buffer_duration: 30.0       # Keep 30s of transform history
    scan_buffer_size: 20           # Buffer 20 scans for matching
    # Cap how far back the buffer's scans can reach. Older drifted poses
    # produce stale match candidates that drag the current estimate;
    # 6.0 m is the C1's useful range, so we discard far-history scans
    # without losing the local neighborhood. Helps prevent the
    # progressive wall-thickening symptom.
    scan_buffer_maximum_scan_distance: 6.0

    # ============================================
    # SCAN MATCHING (trust the scan matcher)
    # ============================================
    use_scan_matching: true
    # Flipped true → false on 2026-05-13. Scan-barycenter mode matches
    # against the centroid of points, which biases on asymmetric
    # environments (testbeds where one wall is closer than another).
    # Raw-point matching usually wins in feature-rich indoor spaces.
    # Flip back to true ONLY if the wall-thickening worsens — barycenter
    # helps in low-feature scenes (long corridors, blank walls).
    use_scan_barycenter: false
    minimum_time_interval: 0.0     # Process every scan immediately
    
    # ============================================
    # MAP PARAMETERS - HIGH RESOLUTION FOR SMALL SPACES
    # ============================================
    # CRITICAL: For 1x1m or 2x2m testbeds, use 2cm resolution!
    # 5cm resolution causes "quantization jitter" in AMCL
    resolution: 0.02               # 2cm per pixel (was 5cm)
    max_laser_range: 12.0          # Full LIDAR range
    
    # ============================================
    # CORRELATION PARAMETERS
    # ============================================
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.03
    
    # ============================================
    # LOOP CLOSURE
    # ============================================
    do_loop_closing: true
    loop_search_space_dimension: 3.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03
    loop_search_maximum_distance: 3.0
    # Match-strictness thresholds. The first iteration (0.40/0.45) was
    # over-tightened — drift accumulated faster than loop closures could
    # fire to correct it. Loosened a notch (0.35/0.40) on 2026-05-13:
    # still well above SLAM Toolbox's permissive defaults that originally
    # let map-warping closures land, but accepts enough good closures
    # to actually correct drift. Chain size + max variance stay the same.
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.40
    # Same fine-match floor for the per-link scan matcher.
    link_match_minimum_response_fine: 0.40

    # ============================================
    # MAP PUBLISHING
    # ============================================
    publish_map_updates: true
    enable_interactive_mode: false
