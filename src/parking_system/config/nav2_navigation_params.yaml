# Nav2 Parameters for Parking Navigation System
# Optimized for small-scale indoor environment (1-2m areas)
# Supports road mask/keepout zones

amcl:
  ros__parameters:
    use_sim_time: false
    
    # Frame configuration
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    global_frame_id: "map"
    scan_topic: "/scan"
    
    # UPDATE RATE - VERY FREQUENT FOR SMALL SPACE
    update_min_d: 0.02       # Update every 2cm
    update_min_a: 0.05       # Update every ~3 degrees
    
    # RESAMPLING - FAST CONVERGENCE
    resample_interval: 1     # Resample every update
    
    # PARTICLE FILTER - DENSE FOR GLOBAL LOCALIZATION
    min_particles: 5000      # Dense cloud
    max_particles: 10000     # Wide coverage
    pf_err: 0.01             # Lower error threshold
    pf_z: 0.99               # High confidence required
    
    # RECOVERY - AGGRESSIVE
    recovery_alpha_slow: 0.0     # Disable slow recovery
    recovery_alpha_fast: 0.1     # Fast recovery
    
    # LASER MODEL - AGGRESSIVE MATCHING (TRUST LASER!)
    laser_model_type: "likelihood_field_prob"
    laser_max_range: 8.0
    laser_min_range: 0.05
    max_beams: 180           # Use ALL beams for shape matching
    
    # LIKELIHOOD FIELD - WIDE ATTRACTION
    sigma_hit: 0.1           # 10cm acceptance radius
    laser_likelihood_max_dist: 8.0   # Search entire room
    
    # LASER MODEL WEIGHTS - TRUST GEOMETRY
    z_hit: 0.9               # Trust laser hits!
    z_rand: 0.1              # Allow some noise
    z_short: 0.0
    z_max: 0.0
    
    # BEAM SKIP - DISABLED FOR GLOBAL LOCALIZATION
    do_beamskip: false       # Use ALL beams
    
    # ODOMETRY MODEL
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    
    # TF SETTINGS
    tf_broadcast: true
    transform_tolerance: 1.0
    
    # INITIAL POSE - DISABLED FOR GLOBAL LOCALIZATION
    set_initial_pose: false
    always_reset_initial_pose: false
    first_map_only: true

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    # Replan only when the current path becomes invalid, not on a fixed timer.
    # This cuts steady-state planner work while still reacting to obstacles.
    default_nav_to_pose_bt_xml: "/opt/ros/jazzy/share/nav2_bt_navigator/behavior_trees/navigate_w_replanning_only_if_path_becomes_invalid.xml"
    enable_groot_monitoring: false

controller_server:
  ros__parameters:
    use_sim_time: false
    # 20 Hz keeps RPP responsive on tight curves where each 10 Hz tick was
    # ~3 cm of travel — non-trivial when the lookahead floor sits near R_min.
    # RPP is cheap (no trajectory sampling) so the Pi5 has the headroom.
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.3
      movement_time_allowance: 10.0
    
    general_goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      # 15 cm tolerance: tightened from 5 cm because the L298N chassis has a
      # ~60% PWM static-friction deadband — it can't trim the last few cm at
      # creep speed without lurching. Loosen tolerance so the controller
      # commits to one final approach and stops cleanly.
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 0.1  # ~6 degrees
    
    # Regulated Pure Pursuit - Ackermann-friendly path tracking.
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.30
      # Lookahead floor lifted to ≈ R_min (= wheelbase / tan(max_steer)
      # = 0.25 / tan(30°) ≈ 0.43 m) so the carrot is always reachable by
      # the chassis. With min < R_min, RPP's velocity-scaled lookahead can
      # shrink the carrot inside a circle the car physically can't draw,
      # which manifests as oscillation around the path through curves.
      lookahead_dist: 0.55
      min_lookahead_dist: 0.45
      max_lookahead_dist: 0.80
      use_velocity_scaled_lookahead_dist: true
      transform_tolerance: 0.2
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.2
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: true
      cost_scaling_dist: 0.6
      cost_scaling_gain: 1.0
      # Slow-down threshold sits ABOVE R_min (0.43 m) so the regulator
      # decelerates BEFORE the chassis hits its physical turning limit,
      # not at it. Previously this matched R_min exactly and the slowdown
      # only kicked in once we'd already asked for the impossible.
      regulated_linear_scaling_min_radius: 0.55
      # Aligned with the chassis's actual minimum movable speed: the L298N
      # firmware deadband-kicks any non-zero SPEED to ~60% PWM, which on this
      # chassis corresponds to ≈ 0.18 m/s. Below this the bridge's
      # min_vx_creep (0.05 m/s) gates output to SPEED 0, stalling the robot
      # mid-curve. Keeping the controller's regulated floor above the bridge
      # gate prevents that stall.
      regulated_linear_scaling_min_speed: 0.18
      # Ackermann chassis: no rotate-in-place. Reversing IS allowed (paired
      # with the planner's REEDS_SHEPP default below) — on a 2x2 m testbed
      # DUBIN's forward-only paths produced contorted loops that satisfied
      # the goal-yaw constraint but fit poorly inside the box. Allowing
      # reverse + REEDS_SHEPP lets the planner emit a clean K-turn or
      # back-into-pose segment when needed; the cusp-tracking trade-off is
      # acceptable for parking-style maneuvers in tight spaces.
      use_rotate_to_heading: false
      allow_reversing: true
      max_robot_pose_search_dist: 5.0

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: false
      rolling_window: true
      width: 2
      height: 2
      resolution: 0.02  # 2cm resolution for small spaces
      robot_radius: 0.1
      plugins: ["obstacle_layer", "inflation_layer"]
      
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 2.5
          raytrace_min_range: 0.0
          obstacle_max_range: 2.0
          obstacle_min_range: 0.0
      
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.2
      
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: false
      robot_radius: 0.1
      resolution: 0.05  # Coarser global grid for faster Hybrid-A* planning
      track_unknown_space: true
      # Plugins: static map, road mask (keepout), obstacles, inflation
      plugins: ["static_layer", "keepout_filter", "obstacle_layer", "inflation_layer"]
      
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        enabled: true
      
      # Road mask - blocks areas outside drawn roads
      keepout_filter:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: true
        map_topic: /road_mask
        map_subscribe_transient_local: true
        subscribe_to_updates: false
      
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
      
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 2.5
        inflation_radius: 0.12
      
      always_send_full_costmap: true

# Keepout filter configuration (optional - use if you have a road mask)
# To enable: add "keepout_filter" to plugins list above
# keepout_filter:
#   plugin: "nav2_costmap_2d::KeepoutFilter"
#   enabled: true
#   filter_info_topic: "/costmap_filter_info"

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

planner_server:
  ros__parameters:
    expected_planner_frequency: 5.0
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner::SmacPlannerHybrid"
      tolerance: 0.10
      downsample_costmap: false
      allow_unknown: false
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 2.0
      # REEDS_SHEPP for small-testbed work. DUBIN's forward-only paths
      # produced contorted loops that satisfied the goal-yaw constraint
      # but fit poorly inside a 2x2 m box. REEDS_SHEPP can emit a reverse
      # segment when needed, eliminating the visible "robot drives weird
      # circle" pattern the user reported. The cusp-tracking trade-off
      # (RPP follows reverse cusps less smoothly than forward arcs) is
      # acceptable for the parking use case; reverse_penalty: 2.0 below
      # still biases the planner toward forward solutions when both fit.
      motion_model_for_search: "REEDS_SHEPP"
      angle_quantization_bins: 72
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 3.0
      minimum_turning_radius: 0.45
      reverse_penalty: 2.0
      change_penalty: 0.5
      non_straight_penalty: 1.20
      cost_penalty: 1.5
      retrospective_penalty: 0.015
      lookup_table_size: 20.0
      cache_obstacle_heuristic: true
      smooth_path: true
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    wait:
      plugin: "nav2_behaviors::Wait"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.5
    min_rotational_vel: 0.1
    rotational_acc_lim: 1.5

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200  # 200ms pause at each waypoint

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.3, 0.0, 0.5]
    min_velocity: [-0.3, 0.0, -0.5]
    max_accel: [1.5, 0.0, 2.0]
    max_decel: [-1.5, 0.0, -2.0]
    odom_topic: "odom"
    odom_duration: 0.1
    # vx deadband matches the bridge's min_vx_creep (0.05 m/s). Keeps the
    # smoother from emitting fractional values the chassis can't realize.
    deadband_velocity: [0.05, 0.0, 0.0]
    velocity_timeout: 1.0

collision_monitor:
  ros__parameters:
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel_safe"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.2
    source_timeout: 1.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    polygons: ["FootprintApproach"]
    FootprintApproach:
      type: "polygon"
      action_type: "approach"
      footprint_topic: "/local_costmap/published_footprint"
      time_before_collision: 1.2
      simulation_time_step: 0.1
      min_points: 6
      visualize: false
      enabled: true
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "scan"
      min_height: 0.0
      max_height: 2.0
      enabled: true
