name: autonnexa_mobile
description: AutoNexa autonomous parking robot controller — mobile app for ROS2 bridge.
publish_to: 'none'
version: 2.1.0
environment:
  sdk: ">=2.18.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  google_fonts: ^6.0.0
  provider: ^6.1.0
  shared_preferences: ^2.2.0
  path_provider: ^2.1.0
  web_socket_channel: ^2.4.0
  xterm: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
