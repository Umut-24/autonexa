amcl:
  ros__parameters:
    # ============================================
    # FRAME CONFIGURATION
    # ============================================
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    global_frame_id: "map"
    scan_topic: "/scan"
    
    # ============================================
    # UPDATE RATE - FREQUENT FOR SMALL SPACE
    # ============================================
    update_min_d: 0.02       # Update every 2cm (more sensitive)
    update_min_a: 0.05       # Update every ~3 degrees
    
    # ============================================
    # RESAMPLING - BALANCE BETWEEN SPEED AND STABILITY
    # ============================================
    resample_interval: 1     # Resample every update for FAST convergence
    
    # ============================================
    # PARTICLE FILTER - DENSE FOR GLOBAL LOCALIZATION
    # ============================================
    # More particles = better chance of finding correct pose
    min_particles: 5000      # Dense cloud
    max_particles: 10000     # Very wide coverage for global localization
    pf_err: 0.01             # Lower error threshold (more precise)
    pf_z: 0.99               # Higher confidence required
    
    # ============================================
    # RECOVERY - AGGRESSIVE FOR GLOBAL LOCALIZATION
    # ============================================
    recovery_alpha_slow: 0.0     # Disable slow recovery (we want fast snap)
    recovery_alpha_fast: 0.1     # Enable fast recovery
    
    # ============================================
    # LASER MODEL - AGGRESSIVE MATCHING
    # ============================================
    laser_model_type: "likelihood_field_prob"  # Better model for matching!
    
    laser_max_range: 8.0
    laser_min_range: 0.05
    
    # Use more beams for better geometry matching during global localization
    max_beams: 180           # Use ALL available beams for shape matching
    
    # ============================================
    # LIKELIHOOD FIELD - WIDE ATTRACTION
    # ============================================
    # sigma_hit: Controls acceptance radius around walls
    sigma_hit: 0.1           # 10cm acceptance radius
    
    # Search wide for walls (critical for global localization!)
    laser_likelihood_max_dist: 8.0   # Search entire small room
    
    # ============================================
    # LASER MODEL WEIGHTS - TRUST GEOMETRY
    # ============================================
    z_hit: 0.9               # Trust laser hits
    z_rand: 0.1              # Allow some noise
    z_short: 0.0
    z_max: 0.0
    
    # ============================================
    # BEAM SKIP - DISABLED FOR GLOBAL LOCALIZATION
    # ============================================
    # During global localization, we want ALL data
    do_beamskip: false       # Use ALL beams for matching
    
    # ============================================
    # ODOMETRY MODEL - MODERATE TRUST
    # ============================================
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    
    # Balanced values for laser scan matcher odometry
    alpha1: 0.2     # Some spread allowed
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    
    # ============================================
    # TF SETTINGS
    # ============================================
    tf_broadcast: true
    transform_tolerance: 1.0
    
    # ============================================
    # INITIAL POSE - DISABLED FOR GLOBAL LOCALIZATION
    # ============================================
    # Don't set initial pose - let service handle it
    set_initial_pose: false
    always_reset_initial_pose: false
    
    # ============================================
    # MAP SETTINGS
    # ============================================
    first_map_only: true
